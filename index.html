  .blob.c { width: 220px; height: 220px; background: #a78bfa; bottom: 40px; left: -40px; animation-delay: -9s; }
  @keyframes float { 0%,100% { transform: translate(0,0) scale(1);} 50% { transform: translate(25px,-30px) scale(1.08);} }

  .app { position: relative; z-index: 1; width: 100%; max-width: 500px; }

  .campaign .label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; color: var(--muted); margin-bottom: 6px; }

  .cbar { height: 12px; background: #eee; border-radius: 999px; overflow: hidden; }

  .bands { display: flex; gap: 6px; margin-top: 10px; }
  .band { flex: 1; text-align: center; font-size: 10.5px; font-weight: 800; color: var(--muted); padding: 8px 2px; border-radius: 12px; background: #f3f4f6; border: 2px solid transparent; transition: 0.25s; }
  .band .be { display: block; font-size: 17px; margin-bottom: 2px; }
  .band.done { background: var(--good-bg); color: var(--good); }
  .band.current { border-color: var(--accent); color: var(--accent); background: #f5f3ff; }

  .btn:active { transform: translateY(0) scale(0.99); }
  .btn.secondary { background: #f3f4f6; color: var(--accent); box-shadow: none; margin-top: 10px; }

  .btn.big { font-size: 20px; padding: 18px; }
  .btn.pulse { animation: pulseBtn 1.1s ease-in-out infinite; }

  .pill { font-size: 13px; font-weight: 800; padding: 7px 13px; border-radius: 999px; background: #f5f3ff; color: var(--accent); }
  .topright { display: flex; align-items: center; gap: 8px; }
  .lives { font-size: 18px; letter-spacing: 1px; }
  .iconbtn { border: none; background: #f3f4f6; width: 38px; height: 38px; border-radius: 12px; font-size: 18px; cursor: pointer; line-height: 1; }

  .qtext { text-align: center; font-weight: 800; font-size: 20px; margin: 6px 0 4px; color: var(--ink); }
  .qhint { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 14px; font-weight: 600; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

  .opt { position: relative; border: 3px solid #e5e7eb; background: #fff; border-radius: 16px; padding: 16px 12px; font-size: 15.5px; font-weight: 800;

    display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: #faf5ff; transform: translateY(-2px); }

  .opt .badge { position: absolute; top: -12px; right: -8px; font-size: 24px; opacity: 0; transform: scale(0.4); transition: 0.25s; }
  .opt.correct { border-color: var(--good); background: var(--good-bg); color: var(--good); animation: bump 0.4s; }
  .opt.correct .badge { opacity: 1; transform: scale(1); }
  .opt.wrong { border-color: var(--bad); background: var(--bad-bg); color: var(--bad); animation: shake 0.4s; }
  .opt.wrong .badge { opacity: 1; transform: scale(1); }
  .opt.dim { opacity: 0.4; }
  .opt.reveal { animation: glowGood 1s ease-in-out infinite; }
  @keyframes bump { 0%,100% { transform: scale(1);} 40% { transform: scale(1.06);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }

  .banner.bad { background: var(--bad-bg); border: 2px solid #fda4af; }

  .banner .msg { font-size: 20px; font-weight: 800; margin-top: 4px; }
  .banner.good .msg { color: var(--good); }
  .banner.bad .msg { color: var(--bad); }

  .score-big { text-align: center; font-size: 48px; font-weight: 800; margin: 6px 0; color: var(--accent); }
  .score-sub { text-align: center; color: var(--muted); font-size: 16px; margin-bottom: 6px; line-height: 1.5; font-weight: 600; }
  .stars { text-align: center; font-size: 38px; letter-spacing: 6px; margin: 12px 0 16px; }

  {n:"Saint Vincent and the Grenadines", f:"🇻🇨", c:"NA"},
  {n:"Kiribati", f:"🇰🇮", c:"OC"},
  {n:"Marshall Islands", f:"🇲🇭", c:"OC"},
  {n:"Micronesia", f:"🇫🇲", c:"OC"},
  {n:"Nauru", f:"🇳🇷", c:"OC"},
  {n:"Palau", f:"🇵🇼", c:"OC"},
  {n:"Samoa", f:"🇼🇸", c:"OC"},
  {n:"Solomon Islands", f:"🇸🇧", c:"OC"},
  {n:"Tonga", f:"🇹🇴", c:"OC"},
  {n:"Tuvalu", f:"🇹🇻", c:"OC"},
  {n:"Vanuatu", f:"🇻🇺", c:"OC"},
];

/* ============================================================ CONFIG */
const PER_LEVEL = 10;                 // flags per level
const STARTING_LIVES = 3;
const PASS_RATIO = 0.7;               // need 70% to advance

// Split the ordered list into levels of 10 (last level takes the remainder).
const LEVELS = [];
for (let i = 0; i < COUNTRIES.length; i += PER_LEVEL) LEVELS.push(COUNTRIES.slice(i, i + PER_LEVEL));
const MAX_LEVEL = LEVELS.length;      // 20
const TOTAL_COUNTRIES = COUNTRIES.length; // 195

// 5 difficulty bands across the levels
const BANDS = [
  {name:"Beginner", be:"🌱"},
  {name:"Explorer", be:"🧭"},
  {name:"Adventurer", be:"⛰️"},
  {name:"Expert", be:"🎯"},
  {name:"Legend", be:"👑"},
];
const LEVELS_PER_BAND = Math.ceil(MAX_LEVEL / BANDS.length);
function bandIndex(level){ return Math.min(Math.floor((level - 1) / LEVELS_PER_BAND), BANDS.length - 1); }
function bandName(level){ return BANDS[bandIndex(level)].name; }

const CHEERS = ["Correct! 🎉", "Yes! 🌟", "Awesome! 🚀", "You got it! 👏", "Great job! 💪", "Woohoo! 🎊"];
const KINDLY = ["Good try! 😊", "Nice try! 🙂", "Almost! 👍", "Keep going! 🌈"];

/* ============================================================ STATE */
let level = 1, qIndex = 0, correctCount = 0, lives = STARTING_LIVES;
let deck = [], qTotal = PER_LEVEL, locked = false;
let unlockedLevel = loadProgress();
let soundOn = loadSound();
const card = document.getElementById("card");

/* ---------- helpers ---------- */
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function loadProgress(){ try { return Math.min(Math.max(parseInt(localStorage.getItem("cg_unlocked")||"1",10),1),MAX_LEVEL);} catch(e){ return 1; } }
function saveProgress(lv){ try { localStorage.setItem("cg_unlocked",String(lv)); } catch(e){} }
function loadSound(){ try { return localStorage.getItem("cg_sound")!=="off"; } catch(e){ return true; } }
function saveSound(v){ try { localStorage.setItem("cg_sound", v?"on":"off"); } catch(e){} }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function passMark(len){ return Math.ceil(len * PASS_RATIO); }

/* ---------- sound (Web Audio, no files) ---------- */
let audioCtx = null;
function tone(freqs, dur, type){
  if(!soundOn) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    freqs.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||"sine"; o.frequency.value=f;
      const start=audioCtx.currentTime + i*0.12;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(0.25,start+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(start); o.stop(start+dur+0.02);
    });
  }catch(e){}
}
const sndCorrect = ()=> tone([523,659,784], 0.22, "triangle");
const sndWrong   = ()=> tone([300,220], 0.25, "sine");
const sndWin     = ()=> tone([523,659,784,1047], 0.3, "triangle");
const sndTap     = ()=> tone([440], 0.05, "square");

/* ---------- confetti ---------- */
function confetti(n){
  const box=document.getElementById("confetti");
  const colors=["#f472b6","#38bdf8","#a78bfa","#fbbf24","#34d399","#fb7185"];
  for(let i=0;i<n;i++){
    const p=document.createElement("div");
    p.className="confetti-piece";
    p.style.left=Math.random()*100+"vw";
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(1.6+Math.random()*1.4)+"s";
    p.style.animationDelay=(Math.random()*0.3)+"s";
    p.style.transform="rotate("+Math.random()*360+"deg)";
    box.appendChild(p);
    setTimeout(()=>p.remove(), 3200);
  }
}

/* ---------- deck: this level's flags + smart wrong answers ---------- */
function buildDeck(lv){
  const answers = shuffle(LEVELS[lv-1]);
  return answers.map(answer=>{
    const sameC = COUNTRIES.filter(c=>c.n!==answer.n && c.c===answer.c);
    const anywhere = COUNTRIES.filter(c=>c.n!==answer.n);
    const distractors=[];
    for(const bucket of [shuffle(sameC), shuffle(anywhere)]){
      for(const c of bucket){ if(distractors.length>=3) break; if(!distractors.some(d=>d.n===c.n)) distractors.push(c); }
      if(distractors.length>=3) break;
    }
    return { answer, options: shuffle([answer,...distractors]) };
  });
}

/* ============================================================ UI bits */
function soundBtnHtml(){ return `<button class="iconbtn" id="soundBtn" title="Sound on/off" aria-label="Sound">${soundOn?"🔊":"🔇"}</button>`; }
function wireSoundBtn(){ const b=document.getElementById("soundBtn"); if(b) b.onclick=()=>{ soundOn=!soundOn; saveSound(soundOn); b.textContent=soundOn?"🔊":"🔇"; if(soundOn) sndTap(); }; }

/* ============================================================ SCREENS */
function renderStart(){
  const cleared = unlockedLevel - 1;
  const pct = (cleared / MAX_LEVEL) * 100;
  const bands = BANDS.map((b,i)=>{
    const lastLevelInBand = (i+1)*LEVELS_PER_BAND;
    const cls = cleared >= lastLevelInBand ? "done" : bandIndex(unlockedLevel)===i ? "current" : "";
    return `<div class="band ${cls}"><span class="be">${b.be}</span>${b.name}</div>`;
  }).join("");

  card.className="card fade";
  card.innerHTML=`
    <div class="topbar"><span></span><div class="topright">${soundBtnHtml()}</div></div>
    <div class="hero-emoji">🌍</div>
    <h1>Guess the Country</h1>
    <p class="subtitle">Learn <b>all ${TOTAL_COUNTRIES} flags</b> in the world across <b>${MAX_LEVEL} levels</b>!</p>
    <ul class="rules">
      <li><span class="ic">👀</span><span>See a <b>flag</b>? Tap the country you think it is.</span></li>
      <li><span class="ic">✅</span><span>Green means <b>correct</b>. Great job!</span></li>
      <li><span class="ic">💡</span><span>Wrong? We'll <b>show you</b> the right one.</span></li>
      <li><span class="ic">❤️</span><span>You have <b>3 hearts</b> each level.</span></li>
      <li><span class="ic">👑</span><span>Finish all ${MAX_LEVEL} levels to become a <b>World Flag Master!</b></span></li>
    </ul>
    <div class="campaign">
      <div class="label"><span>Your journey</span><span><b>${cleared}</b> / ${MAX_LEVEL} levels done</span></div>
      <div class="cbar"><i style="width:${pct}%"></i></div>
      <div class="bands">${bands}</div>
    </div>
    <button class="btn big pulse" id="playBtn">${unlockedLevel>1?`▶ Play Level ${unlockedLevel}`:"▶ Let's Play!"}</button>
    <button class="btn secondary" id="restartBtn">🔄 Start from the Beginning</button>
  `;
  wireSoundBtn();
  document.getElementById("playBtn").onclick=()=>{ sndTap(); startLevel(unlockedLevel); };
  document.getElementById("restartBtn").onclick=()=>{ sndTap(); unlockedLevel=1; saveProgress(1); startLevel(1); };
}

function startLevel(lv){ level=lv; qIndex=0; correctCount=0; lives=STARTING_LIVES; deck=buildDeck(lv); qTotal=deck.length; renderQuestion(); }

function renderQuestion(){
  locked=false;
  const q=deck[qIndex];
  const hearts="❤️".repeat(lives)+"🖤".repeat(STARTING_LIVES-lives);
  const pct=(qIndex/qTotal)*100;
  card.className="card";
  card.innerHTML=`
    <div class="topbar">
      <span class="pill">Level ${level}/${MAX_LEVEL} · ${bandName(level)}</span>
      <div class="topright"><span class="lives" title="Hearts left">${hearts}</span>${soundBtnHtml()}<button class="iconbtn" id="homeBtn" title="Home" aria-label="Home">🏠</button></div>
    </div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="qcount">Flag ${qIndex+1} of ${qTotal} · Stars ${correctCount} ⭐</div>
    <div class="flagwrap"><div class="flag">${q.answer.f}</div></div>
    <div class="qtext">Whose flag is this?</div>
    <div class="qhint">👇 Tap the country you think it is</div>
    <div class="options" id="opts"></div>
    <div id="bannerSlot"></div>
  `;
  wireSoundBtn();
  const hb=document.getElementById("homeBtn");
  if(hb) hb.onclick=()=>{ sndTap(); renderStart(); };
  const optsEl=document.getElementById("opts");
  q.options.forEach(opt=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span>${opt.n}</span><span class="badge"></span>`;
    b.onclick=()=>choose(b,opt,q);
    optsEl.appendChild(b);
  });
}

function choose(btn, opt, q){
  if(locked) return;
  locked=true;
  const isRight = opt.n===q.answer.n;
  const buttons=[...document.querySelectorAll(".opt")];
  buttons.forEach(b=>{
    b.disabled=true;
    const name=b.querySelector("span").textContent;
    const badge=b.querySelector(".badge");
    if(name===q.answer.n){ b.classList.add("correct"); badge.textContent="✅"; if(!isRight) b.classList.add("reveal"); }
    else if(b===btn){ b.classList.add("wrong"); badge.textContent="❌"; }
    else b.classList.add("dim");
  });

  const slot=document.getElementById("bannerSlot");
  const last = qIndex>=qTotal-1;
  const nextLabel = last ? "See my score ⭐" : "Next flag ▶";

  if(isRight){
    correctCount++;
    sndCorrect(); confetti(26);
    slot.innerHTML=`
      <div class="banner good">
        <div class="face">🎉</div>
        <div class="msg">${pick(CHEERS)}</div>
        <div class="detail">That's <span class="bigflag">${q.answer.f}</span> <b>${q.answer.n}</b></div>
        <button class="btn big pulse nextbtn" id="nextBtn">${nextLabel}</button>
      </div>`;
  } else {
    lives--;
    sndWrong();
    slot.innerHTML=`
      <div class="banner bad">
        <div class="face">💡</div>
        <div class="msg">${pick(KINDLY)}</div>
        <div class="detail">The right answer is <span class="bigflag">${q.answer.f}</span> <b>${q.answer.n}</b></div>
        <button class="btn big pulse nextbtn" id="nextBtn">${lives<=0 ? "See my score ⭐" : nextLabel}</button>
      </div>`;
  }
  const banner=slot.querySelector(".banner");
  if(banner) banner.scrollIntoView({behavior:"smooth", block:"nearest"});

  document.getElementById("nextBtn").onclick=()=>{
    sndTap();
    if(lives<=0){ renderResults(false); return; }
    qIndex++;
    if(qIndex>=qTotal) renderResults(correctCount>=passMark(qTotal));
    else renderQuestion();
  };
}

function renderResults(passed){
  const outOfLives = lives<=0;
  const ratio = correctCount/qTotal;
  const stars = ratio>=1?3:ratio>=0.9?2:passed?1:0;
  const starRow="⭐".repeat(stars)+"☆".repeat(3-stars);
  const need = passMark(qTotal);
  let emoji,title,sub;
  const wonGame = passed && level>=MAX_LEVEL;

  if(wonGame){ emoji="👑"; title="World Flag Master!"; sub=`Incredible! You finished all ${MAX_LEVEL} levels and know all ${TOTAL_COUNTRIES} flags in the world!`; }
  else if(passed){ emoji=pick(["🎉","🌟","🚀","🔥","🎊"]); title=`Level ${level} done!`; sub=`Amazing! Level ${level+1} (${bandName(level+1)}) is open now.`; }
  else if(outOfLives){ emoji="💪"; title="Out of hearts!"; sub=`You got ${correctCount} right. Take a breath and try again. You've got this!`; }
  else { emoji="🙂"; title="So close!"; sub=`You got ${correctCount}. You need ${need} to move up. Give it another go!`; }

  if(passed){ unlockedLevel=Math.max(unlockedLevel, Math.min(level+1,MAX_LEVEL)); saveProgress(unlockedLevel); }
  if(passed){ sndWin(); confetti(wonGame?140:80); } else { sndWrong(); }

  card.className="card fade";
  card.innerHTML=`
    <div class="topbar"><span></span><div class="topright">${soundBtnHtml()}</div></div>
    <div class="result-emoji">${emoji}</div>
    <div class="score-big">${correctCount}<span style="font-size:24px;color:var(--muted)">/${qTotal}</span></div>
    <div class="stars">${starRow}</div>
    <h1 style="font-size:28px">${title}</h1>
    <div class="score-sub">${sub}</div>
    <div id="resBtns" style="margin-top:20px"></div>
  `;
  wireSoundBtn();
  const box=document.getElementById("resBtns");
  const addBtn=(label,cls,fn)=>{ const b=document.createElement("button"); b.className="btn big"+(cls?" "+cls:""); b.textContent=label; b.onclick=()=>{ sndTap(); fn(); }; box.appendChild(b); };

  if(wonGame){ addBtn("Play again 🔁","pulse",()=>{ unlockedLevel=1; saveProgress(1); startLevel(1); }); addBtn("🏠 Home","secondary",renderStart); }
  else if(passed){ addBtn(`▶ Go to Level ${level+1}`,"pulse",()=>startLevel(level+1)); addBtn("🏠 Home","secondary",renderStart); }
  else { addBtn(`🔁 Try Level ${level} again`,"pulse",()=>startLevel(level)); addBtn("🏠 Home","secondary",renderStart); }
}

/* ---------- boot ---------- */
renderStart();
</script>
